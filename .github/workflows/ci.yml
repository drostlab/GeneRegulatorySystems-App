name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-smoke-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            julia_arch: aarch64
          - runner: ubuntu-latest
            julia_arch: x64
          - runner: windows-latest
            julia_arch: x64

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
          arch: ${{ matrix.julia_arch }}

      - name: Cache Julia depot
        uses: actions/cache@v4
        with:
          path: ~/.julia
          key: julia-depot-${{ runner.os }}-${{ matrix.julia_arch }}-${{ hashFiles('backend/Project.toml', 'backend/Manifest.toml') }}
          restore-keys: julia-depot-${{ runner.os }}-${{ matrix.julia_arch }}-

      - name: Instantiate Julia backend
        working-directory: backend
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Install jq (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y jq

      - name: Install jq (macOS)
        if: runner.os == 'macOS'
        run: brew install jq

      - name: Install jq (Windows)
        if: runner.os == 'Windows'
        run: choco install jq -y

      - name: Run smoke test
        shell: bash
        run: ./backend/smoke-test.sh
