name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-smoke-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            julia_arch: aarch64
          - runner: ubuntu-latest
            julia_arch: x64
          - runner: windows-latest
            julia_arch: x64

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
          arch: ${{ matrix.julia_arch }}

      - name: Cache Julia depot
        uses: actions/cache@v4
        with:
          path: ~/.julia
          key: julia-depot-${{ runner.os }}-${{ matrix.julia_arch }}-${{ hashFiles('backend/Project.toml', 'backend/Manifest.toml') }}
          restore-keys: julia-depot-${{ runner.os }}-${{ matrix.julia_arch }}-

      - name: Instantiate Julia backend
        working-directory: backend
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Install jq (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y jq

      - name: Install jq (macOS)
        if: runner.os == 'macOS'
        run: brew install jq

      - name: Install jq (Windows)
        if: runner.os == 'Windows'
        run: choco install jq -y

      - name: Run smoke test
        shell: bash
        run: ./backend/smoke-test.sh

  frontend-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check and build frontend
        working-directory: frontend
        run: npm run build

  tauri-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
            tauri-app/target/
          key: cargo-${{ runner.os }}-${{ hashFiles('tauri-app/Cargo.toml', 'tauri-app/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Cargo check
        working-directory: tauri-app
        run: cargo check
